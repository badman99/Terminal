name: Badal-Voice-Clone-AI
on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Maximize Memory (Swap)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 📦 Install Voice Cloning Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade pip
          pip install git+https://github.com/coqui-ai/TTS.git
          pip install gradio pydub

      - name: 🌍 Setup Bore (Tunnel)
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: 🎙️ Create Voice Cloning Script (Auto-Agree Mode)
        run: |
          cat << 'EOF' > voice_app.py
          import gradio as gr
          from TTS.api import TTS
          import torch
          import os

          # लाइसेंस एग्रीमेंट को ऑटो-एग्री करने का जुगाड़ 🤫
          os.environ["COQUI_TOS_AGREED"] = "1"

          print("--- Loading XTTS-v2 Voice Model ---")
          # मॉडल डाउनलोड और लोड हो रहा है
          tts = TTS("tts_models/multilingual/multi-dataset/xtts_v2").to("cpu")

          def clone_voice(text, audio_file):
              output_path = "output.wav"
              tts.tts_to_file(
                  text=text,
                  speaker_wav=audio_file,
                  language="hi",
                  file_path=output_path
              )
              return output_path

          print("--- Launching Badal's Voice Factory ---")
          interface = gr.Interface(
              fn=clone_voice,
              inputs=[
                  gr.Textbox(label="यहाँ वो लिखो जो तुम कहलवाना चाहते हो (Hindi)", placeholder="नमस्ते बादल भाई! कैसे हो?"),
                  gr.Audio(label="6 सेकंड की ऑडियो क्लिप यहाँ डालो", type="filepath")
              ],
              outputs=gr.Audio(label="जनरेटेड आवाज़"),
              title="Badal's Ghost Voice Cloner 🎙️💀"
          )
          interface.launch(server_name="0.0.0.0", server_port=7860)
          EOF

      - name: 🔥 Start Voice Server
        run: |
          # अब ये लाइसेंस के लिए नहीं रुकेगा! 🚀
          python3 voice_app.py &
          sleep 60
          bore local 7860 --to bore.pub
