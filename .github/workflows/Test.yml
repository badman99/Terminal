name: Badal-Smart-Ghost-AI
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Maximize Memory (Swap)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 📦 Install Ollama & Dependencies
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          pip install gradio requests --break-system-packages

      - name: 🧠 Pull Dolphin-Llama3 (8B Smart AI)
        run: |
          ollama serve & 
          sleep 10
          # यह मॉडल हिंदी बहुत अच्छी समझता है और स्मार्ट है
          ollama pull dolphin-llama3
          
      - name: 🌍 Setup Bore (Tunnel)
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: ✍️ Create Smart Chat Script (With Memory)
        run: |
          cat << 'EOF' > chat_app.py
          import gradio as gr
          import requests
          import json

          def chat_function(message, history):
              # History को Ollama के फॉर्मेट में बदलना (Context Memory)
              formatted_messages = []
              for user_msg, bot_msg in history:
                  formatted_messages.append({"role": "user", "content": user_msg})
                  formatted_messages.append({"role": "assistant", "content": bot_msg})
              
              # नया मैसेज जोड़ना
              formatted_messages.append({"role": "user", "content": message})

              url = "http://localhost:11434/api/chat"
              payload = {
                  "model": "dolphin-llama3",
                  "messages": formatted_messages,
                  "stream": False
              }
              
              try:
                  response = requests.post(url, json=payload)
                  response_json = response.json()
                  return response_json['message']['content']
              except Exception as e:
                  return f"Error: {str(e)}"

          # Gradio ChatInterface जो अपने आप हिस्ट्री संभालता है
          print("--- Launching Badal's Smart Ghost AI with Memory ---")
          demo = gr.ChatInterface(
              fn=chat_function, 
              title="Badal's Smart Ghost AI 💀",
              description="मैं सब याद रखता हूँ Badal भाई! जो पूछना है हिंदी में पूछो। 😜",
              examples=["नमस्ते, तुम कौन हो?", "क्या तुम्हें याद है मैंने पहले क्या कहा था?", "एक मजेदार कहानी सुनाओ हिंदी में।"]
          )
          
          demo.launch(server_name="0.0.0.0", server_port=7860)
          EOF

      - name: 🔥 Start Smart AI Server
        run: |
          python3 chat_app.py &
          sleep 15
          bore local 7860 --to bore.pub
