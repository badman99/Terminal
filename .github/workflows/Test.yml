name: Badal-Unrestricted-AI-PC
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Maximize Memory (The 'No-Error' Swap)
        run: |
          # पुराने किसी भी स्वैप को बंद और साफ़ करो
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          
          # नया 6GB स्वैप बनाओ
          sudo fallocate -l 6G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=6144
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 📦 Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv wget git libgl1 libglib2.0-0

      - name: 🛠️ Install AI Libraries
        run: |
          # सीधा सिस्टम पर इंस्टॉल करेंगे ताकि कोई पाथ एरर न आये
          pip install numpy diffusers transformers accelerate gradio pillow --break-system-packages --ignore-installed
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu --break-system-packages

      - name: 🌍 Setup Bore (Tunnel)
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: ✍️ Create AI App Script
        run: |
          cat << 'EOF' > app.py
          import torch
          from diffusers import AutoPipelineForText2Image
          import gradio as gr
          import os

          print("--- Loading Unrestricted AI Model (SDXL Turbo) ---")
          # 15GB RAM के लिए ऑप्टिमाइज़्ड
          pipe = AutoPipelineForText2Image.from_pretrained("stabilityai/sdxl-turbo", torch_dtype=torch.float32)
          
          def generate(prompt):
              # CPU के लिए 1-step काफी है
              image = pipe(prompt=prompt, num_inference_steps=20, guidance_scale=7.5).images[0]
              return image

          print("--- Launching Badal's AI Interface ---")
          demo = gr.Interface(fn=generate, inputs="text", outputs="image", title="Badal's Unrestricted AI 🎨")
          demo.launch(server_name="0.0.0.0", server_port=7860)
          EOF

      - name: 🔥 Start AI & Tunnel
        run: |
          # प्रोग्राम को बैकग्राउंड में चलाओ
          python3 app.py &
          sleep 15
          # पब्लिक लिंक जनरेट करो
          bore local 7860 --to bore.pub
