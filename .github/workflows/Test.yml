name: Badal-Voice-Clone-AI
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Maximize Memory (Swap)
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 📦 Install Voice Cloning Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install git+https://github.com/coqui-ai/TTS.git --break-system-packages
          pip install gradio pydub --break-system-packages

      - name: 🌍 Setup Bore (Tunnel)
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: 🎙️ Create Voice Cloning Script
        run: |
          cat << 'EOF' > voice_app.py
          import gradio as gr
          from TTS.api import TTS
          import torch
          import os

          # Model लोड कर रहे हैं (XTTS-v2) - यह लगभग 2GB का है
          print("--- Loading XTTS-v2 Voice Model (Hindi Supported) ---")
          device = "cpu" # GPU नहीं है तो CPU यूज़ करेंगे
          tts = TTS("tts_models/multilingual/multi-dataset/xtts_v2").to(device)

          def clone_voice(text, audio_file):
              output_path = "output.wav"
              # Voice Clone करना (6 second audio sample से)
              tts.tts_to_file(
                  text=text,
                  speaker_wav=audio_file,
                  language="hi", # हिंदी भाषा सेट है
                  file_path=output_path
              )
              return output_path

          print("--- Launching Badal's Voice Factory ---")
          interface = gr.Interface(
              fn=clone_voice,
              inputs=[
                  gr.Textbox(label="यहाँ वो लिखो जो तुम कहलवाना चाहते हो (Hindi/English)", placeholder="नमस्ते बादल भाई, कैसे हो?"),
                  gr.Audio(label="जिसकी आवाज़ चुरानी है उसकी 6 सेकंड की क्लिप यहाँ डालो (Audio File)", type="filepath")
              ],
              outputs=gr.Audio(label="जनरेटेड आवाज़ (Cloned Voice)"),
              title="Badal's Ghost Voice Cloner 🎙️💀",
              description="किसी की भी आवाज़ चुराओ! बस 6 सेकंड का ऑडियो सैंपल दो और हिंदी में कुछ भी कहलवाओ। 😜"
          )
          interface.launch(server_name="0.0.0.0", server_port=7860)
          EOF

      - name: 🔥 Start Voice Server
        run: |
          # पहली बार मॉडल डाउनलोड होने में 1-2 मिनट लगेंगे (3Gbps नेट है तो फ़ास्ट होगा)
          python3 voice_app.py &
          sleep 30
          bore local 7860 --to bore.pub
