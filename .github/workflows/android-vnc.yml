name: 🤖 Android Emulator + VNC (Bore Stable)

on:
  push:
  workflow_dispatch:

jobs:
  android-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Display + VNC packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc fluxbox wmctrl libpulse0 libnss3 libglu1-mesa
          echo "✅ Packages installed!"

      - name: 📦 Download F-Droid APK
        run: |
          curl -L https://f-droid.org/F-Droid.apk -o fdroid.apk
          echo "✅ F-Droid Downloaded!"

      - name: 🖥️ Start Display, Fluxbox & VNC
        run: |
          # Fluxbox errors fix karne ke liye directory
          mkdir -p ~/.fluxbox
          
          # Virtual display (errors hide kiye hain)
          Xvfb :1 -screen 0 1920x1080x24 2>/dev/null &
          export DISPLAY=:1
          sleep 2

          # Fluxbox start
          fluxbox > /dev/null 2>&1 &
          sleep 3
          echo "✅ Display + Fluxbox Ready!"

          # VNC start (-loop aur -noxkb add kiya hai stability ke liye)
          x11vnc -display :1 -nopw -forever -shared -bg -loop -noxkb -noxrecord -noxfixes -o /tmp/x11vnc.log
          sleep 2
          echo "✅ VNC Started!"

      - name: 🌐 Start bore Tunnel
        run: |
          # Bore install karo
          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx -C /usr/local/bin
          chmod +x /usr/local/bin/bore

          # Background mein tunnel start karo aur log save karo
          bore local 5900 --to bore.pub > /tmp/bore.log 2>&1 &
          sleep 5

          echo "============================================"
          echo "📱 PHONE PE YEH KARO:"
          echo "App  : RealVNC / MultiVNC"
          echo "Host : bore.pub"
          # Log se direct port nikal kar dikhayega
          cat /tmp/bore.log | grep "remote_port\|listening"
          echo "Pass : koi nahi - seedha connect!"
          echo "============================================"

      - name: 📱 Android Emulator — Xvfb :1
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: :1
        with:
          api-level: 28
          target: google_apis_playstore
          arch: x86_64
          # RAM 3072M (3GB) kar di hai taaki Ubuntu crash/OOM kill na kare
          ram-size: 3072M
          heap-size: 1024M
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect -prop qemu.hw.mainkeys=0
          disable-animations: true
          script: |
            echo "✅ Emulator chal raha hai :1 display pe!"
            
            # F-Droid install aur open karo
            adb install fdroid.apk
            echo "✅ F-Droid Installed!"
            adb shell monkey -p org.fdroid.fdroid 1
            sleep 3
            
            echo "📱 Ab phone pe VNC mein Android dikhega!"
            
            # GitHub Timeout ko rokne ke liye keep-alive loop (Har 3 minute mein chalega)
            while true; do
              echo "✅ System is running... VNC & Bore Active"
              sleep 180
            done
