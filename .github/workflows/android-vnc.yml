name: 🤖 Android Emulator + VNC

on:
  push:
  workflow_dispatch:

jobs:
  android-vnc:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Display + VNC + Audio packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc fluxbox wmctrl libpulse0 libnss3 libglu1-mesa pulseaudio zstd
          echo "✅ Packages installed!"

      - name: 🔊 Setup PulseAudio
        run: |
          pulseaudio --start --log-target=file:/tmp/pulseaudio.log
          sleep 2
          echo "✅ PulseAudio Ready!"

      - name: 💾 Restore Backup
        run: |
          echo "🔍 Pichla backup dhundh rahe hain..."
          RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/emulator-state)

          if echo "$RELEASE" | grep -q "browser_download_url"; then
            echo "✅ Backup mila! Download ho raha hai..."

            curl -L -o /tmp/backup.part1 $(echo "$RELEASE" | grep -o '"browser_download_url": "[^"]*part1[^"]*"' | cut -d'"' -f4)
            curl -L -o /tmp/backup.part2 $(echo "$RELEASE" | grep -o '"browser_download_url": "[^"]*part2[^"]*"' | cut -d'"' -f4) || true

            cat /tmp/backup.part1 /tmp/backup.part2 > /tmp/backup.tar.zst 2>/dev/null || cp /tmp/backup.part1 /tmp/backup.tar.zst
            mkdir -p ~/.android/avd/test.avd
            tar -I zstd -xf /tmp/backup.tar.zst -C ~/.android/
            echo "✅ Backup Restore Ho Gaya!"
          else
            echo "⚠️ Pehli baar chal raha hai — koi backup nahi!"
          fi

      - name: 📦 Download F-Droid APK
        run: |
          curl -L https://f-droid.org/F-Droid.apk -o fdroid.apk
          echo "✅ F-Droid Downloaded!"

      - name: 🖥️ Start Display + Fluxbox + VNC + bore
        run: |
          Xvfb :1 -screen 0 1920x1080x24 &
          export DISPLAY=:1
          sleep 2

          fluxbox &
          sleep 3
          echo "✅ Display + Fluxbox Ready!"

          x11vnc -display :1 -nopw -forever -shared -bg -o /tmp/x11vnc.log -xkb -capslock -skip_lockkeys
          sleep 2
          echo "✅ VNC Started!"

          curl -Ls https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx -C /usr/local/bin
          chmod +x /usr/local/bin/bore

          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore.log &
          sleep 5

          echo "============================================"
          echo "📱 PHONE PE YEH KARO:"
          echo "App  : RealVNC / MultiVNC"
          echo "Host : bore.pub"
          echo "Port : (neeche dekho)"
          cat /tmp/bore.log | grep "remote_port\|listening"
          echo "Pass : koi nahi - seedha connect!"
          echo "============================================"

      - name: 📱 Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DISPLAY: :1
          PULSE_SERVER: unix:/tmp/pulse-socket
        with:
          api-level: 28
          target: google_apis_playstore
          arch: x86_64
          ram-size: 8192M
          heap-size: 1024M
          emulator-options: -no-snapshot-save -no-boot-anim -gpu swiftshader_indirect -prop qemu.hw.mainkeys=0
          disable-animations: true
          script: |
            echo "✅ Emulator Ready!"

            adb install fdroid.apk || echo "⚠️ Already installed!"

            echo "📱 AnyDesk se connect karo!"
            sleep 18000

      - name: 💾 Save Backup
        if: always()
        run: |
          echo "💾 Backup le rahe hain..."

          adb shell pm clear com.google.android.gms || true

          tar -I zstd -cf /tmp/backup.tar.zst -C ~/.android avd/
          echo "✅ Compress Ho Gaya!"

          SIZE=$(du -m /tmp/backup.tar.zst | cut -f1)
          echo "📦 Backup Size: ${SIZE}MB"

          if [ "$SIZE" -gt 1900 ]; then
            split -b 1900MB /tmp/backup.tar.zst /tmp/backup.tar.zst.part
            echo "✅ Split Ho Gaya!"
          else
            cp /tmp/backup.tar.zst /tmp/backup.tar.zst.part1
          fi

      - name: 📤 Upload Backup to GitHub Releases
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete emulator-state --yes 2>/dev/null || true
          sleep 2

          gh release create emulator-state \
            --title "💾 Emulator State" \
            --notes "Latest emulator backup" \
            /tmp/backup.tar.zst.part*

          echo "✅ GitHub Release pe Upload Ho Gaya!"

      - name: 🔐 SSH via tmate
        uses: mxschmitt/action-tmate@v3
        if: always()
